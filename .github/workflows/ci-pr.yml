name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  claudemd-size:
    name: CLAUDE.md size check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CLAUDE.md size
        run: |
          SIZE=$(wc -c < CLAUDE.md)
          LIMIT=35000  # 35kB hard cap (Issue #809). Store module detail in docs/module-reference.md.
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::CLAUDE.md size $SIZE exceeds limit $LIMIT bytes. See docs/module-reference.md for detail storage."
            exit 1
          fi
          echo "CLAUDE.md size: $SIZE bytes (under $LIMIT)"

  token-discipline:
    name: Token discipline (raw gray/slate + chromatic guard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against raw gray/slate + chromatic colors in migrated directories
        run: |
          # [Issue #1082 / #1116] Hard-fail if raw Tailwind color utilities reappear
          # in directories already migrated to semantic tokens. Same mechanism as the
          # CLAUDE.md size check above.
          #   - gray/slate  → neutral tokens (foreground / muted / muted-foreground /
          #                   border / surface / input / ring). (#1082, #1061)
          #   - chromatic (red/green/yellow/amber/orange/purple/violet/sky/blue)
          #                 → status tint tokens (bg-{status}-subtle /
          #                   border-{status}-border / text-{status}-foreground /
          #                   bg-{status}, status = success|warning|danger|info). (#1116)
          # Fix violations with the tokens in docs/design-system.md, NOT by editing
          # this whitelist.
          #
          # WHITELIST (guarded) = migrated dirs. #1061 added worktree/mobile/
          # external-apps; #1116 added error/ + auth/.
          # EXCLUDED (intentional always-dark islands / out of scope):
          #   - *Terminal* source files (incl. error/TerminalErrorFallback.tsx): the
          #     terminal output surfaces stay dark in BOTH themes, matching the fixed
          #     xterm theme (#1079) — they use raw dark utilities on purpose.
          #   - src/app/worktrees/**  (worktree detail route / terminal page, incl.
          #     CLI brand colors bg-purple-600/bg-blue-600/bg-green-600).
          # Test files (*.test.*, *.spec.*, __tests__) are excluded because they
          # assert on concrete class strings.
          PATTERN='(bg|text|border|ring)-(gray|slate|red|green|yellow|amber|orange|purple|violet|sky|blue)-[0-9]'
          MATCHES=$(git grep -nE "$PATTERN" -- \
            'src/app' \
            'src/components/ui' \
            'src/components/layout' \
            'src/components/home' \
            'src/components/review' \
            'src/components/repository' \
            'src/components/common' \
            'src/components/sidebar' \
            'src/components/providers' \
            'src/components/worktree' \
            'src/components/mobile' \
            'src/components/external-apps' \
            'src/components/error' \
            'src/components/auth' \
            ':(exclude)src/app/worktrees' \
            | grep -vE '\.test\.|\.spec\.|__tests__' \
            | grep -vE '^[^:]*Terminal[^:]*:' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Raw gray/slate or chromatic color utilities found in migrated directories (Issue #1082 / #1116). Replace with semantic tokens — see docs/design-system.md."
            echo "$MATCHES"
            exit 1
          fi
          echo "Token discipline: no raw gray/slate or chromatic utilities in migrated directories."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # TODO: Remove continue-on-error after fixing existing lint issues
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    # TODO: Remove continue-on-error after fixing existing type errors
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=6144'

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Issue #1102: the integration suite was drifting because it never ran in
      # CI. It is self-contained (in-memory SQLite + mocked fetch/tmux, no external
      # DB or network), so it runs the same way as the unit job. The one
      # environment-dependent case (external-apps duplicate-name → a real product
      # bug returning 500 instead of 409) is quarantined with it.skip + a reason
      # comment in the test file; see the Issue #1102 scope notes.
      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=6144'

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Issue #1180: the E2E suite drifted for months because it never ran in CI
      # — same failure mode as the integration suite in #1102. Only chromium is
      # installed: playwright.config.ts declares a single chromium project (see
      # the comment there on why the Mobile Safari project was dropped).
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config.ts owns the isolation: it boots its own dev server on
      # port 3177 with CM_DB_PATH/CM_ROOT_DIR pinned to a throwaway state dir, so
      # no server or DB setup is needed here.
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=6144'

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_IGNORE_ESLINT_DURING_BUILDS: true

      - name: Build CLI
        run: npm run build:cli

      - name: Build server
        run: npm run build:server

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=critical
