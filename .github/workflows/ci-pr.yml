name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  claudemd-size:
    name: CLAUDE.md size check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CLAUDE.md size
        run: |
          SIZE=$(wc -c < CLAUDE.md)
          LIMIT=35000  # 35kB hard cap (Issue #809). Store module detail in docs/module-reference.md.
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::CLAUDE.md size $SIZE exceeds limit $LIMIT bytes. See docs/module-reference.md for detail storage."
            exit 1
          fi
          echo "CLAUDE.md size: $SIZE bytes (under $LIMIT)"

  token-discipline:
    name: Token discipline (raw gray/slate guard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against raw gray/slate in migrated directories
        run: |
          # [Issue #1082] Hard-fail if raw Tailwind gray/slate color utilities
          # (bg-/text-/border-/ring-<gray|slate>-<n>) reappear in directories that
          # have already been migrated to semantic tokens. Same mechanism as the
          # CLAUDE.md size check above. Fix violations with the semantic tokens in
          # docs/design-system.md (foreground / muted / muted-foreground / border /
          # surface / input / ring), NOT by editing this whitelist.
          #
          # WHITELIST (guarded) = migrated dirs. #1061 extended this to the
          # worktree/mobile/external-apps component trees.
          # EXCLUDED (intentional always-dark islands / not yet migrated):
          #   - *Terminal* source files (worktree/mobile): the terminal output
          #     surfaces stay dark in BOTH themes, matching the fixed xterm theme
          #     (#1079) — they use raw dark utilities on purpose.
          #   - src/app/worktrees/**  (worktree detail route / terminal page,
          #     incl. CLI brand colors) — out of #1061's component scope.
          # Test files (*.test.*, *.spec.*, __tests__) are excluded because they
          # assert on concrete class strings.
          PATTERN='(bg|text|border|ring)-(gray|slate)-[0-9]'
          MATCHES=$(git grep -nE "$PATTERN" -- \
            'src/app' \
            'src/components/ui' \
            'src/components/layout' \
            'src/components/home' \
            'src/components/review' \
            'src/components/repository' \
            'src/components/common' \
            'src/components/sidebar' \
            'src/components/providers' \
            'src/components/worktree' \
            'src/components/mobile' \
            'src/components/external-apps' \
            ':(exclude)src/app/worktrees' \
            | grep -vE '\.test\.|\.spec\.|__tests__' \
            | grep -vE '^[^:]*Terminal[^:]*:' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Raw gray/slate color utilities found in migrated directories (Issue #1082). Replace with semantic tokens — see docs/design-system.md."
            echo "$MATCHES"
            exit 1
          fi
          echo "Token discipline: no raw gray/slate utilities in migrated directories."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # TODO: Remove continue-on-error after fixing existing lint issues
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    # TODO: Remove continue-on-error after fixing existing type errors
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=6144'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_IGNORE_ESLINT_DURING_BUILDS: true

      - name: Build CLI
        run: npm run build:cli

      - name: Build server
        run: npm run build:server

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=critical
